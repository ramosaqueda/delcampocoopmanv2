<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin | Del Campo Coopman</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        /* Custom loading styles */
        body {
            margin: 0;
            background: #012340;
        }

        /* Loading indicator */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            gap: 1rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 164, 17, 0.3);
            border-top-color: #d4a411;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: #94a3b8;
            font-family: system-ui, sans-serif;
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <!-- Loading indicator while CMS loads -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p class="loading-text">Cargando administrador...</p>
    </div>

    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
        // Hide loading when CMS is ready
        document.addEventListener('DOMContentLoaded', function() {
            // Wait for CMS to initialize
            setTimeout(function() {
                var loading = document.getElementById('loading');
                if (loading) {
                    loading.style.display = 'none';
                }
            }, 2000);
        });

        // Handle Netlify Identity login redirect
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>

</html>
